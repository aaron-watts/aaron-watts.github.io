<!DOCTYPE html>

    <title>Aaron Watts</title>

<body>
    <nav class="main">
        <p class="brand"><a href="#" id="link-0">Aaron Watts</a></p>
        <ul>
            <div class="link-container">
                <li><a href="#about" id="link-1">About</a></li>
            </div>
            <div class="link-container">

            <div class="link-container">

    <section class="hero">
        <div>
            <p class="code no-select">
                <span class="bold">
                    <span class="user">

    <section class="about">

            <span class="bold">
                <span class="user">

            <span id="command"></span>./sayhello

    <section class="projects">
        <a class="anchor" id="projects"></a>

        <p class="section-top code no-select">
            <span class="bold">
                <span class="user">
                    aaron-watts</span>@<span class="host">dev</span>:<span class="host">~</span></span>
            <span id="command"></span>ping 127.0.0.1

        <h3 class="code bold no-select">Contact Me</h3>

    <footer></footer>

    <script src="assets/javascript/app.js"></script>
